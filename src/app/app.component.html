<div class="particle-bg"></div>

<!-- ✅ FIXED Install Banner -->
<div class="install-banner" *ngIf="showInstallBanner">
  <button class="pwa-install-btn" (click)="installApp()">
    <span class="icon">📱</span>
    Install SHARE App
    <span class="close-btn" (click)="showInstallBanner = false">✕</span>
  </button>
</div>

<!-- Splash Screen -->
<div id="splash-screen" class="splash-screen">
  <div class="splash-logo">🚀 SHARE</div>
  <div class="splash-spinner"></div>
</div>

<main class="app-main">
  <router-outlet></router-outlet>
</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a routerLink="/" routerLinkActive="active">🏠</a>
  <a routerLink="/blog/create" routerLinkActive="active">➕</a>
  <a routerLink="/" routerLinkActive="active">👤</a>
</nav>
